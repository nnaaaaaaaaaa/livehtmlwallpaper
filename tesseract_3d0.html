* { margin:0; padding:0; box-sizing:border-box; }
body { background:#030408; overflow:hidden; }
#info {
  position:absolute; bottom:20px; left:0; right:0; text-align:center;
  font-family:sans-serif; font-size:13px; color:rgba(255,255,255,0.35);
  pointer-events:none;

<body>
<div id="info">ドラッグで3D視点回転 &nbsp;|&nbsp; 4次元内で自動回転中</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 0, 5.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x030408);
renderer.sortObjects = true;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl1 = new THREE.DirectionalLight(0xaaccff, 1.0);
dl1.position.set(5, 8, 5); scene.add(dl1);
const dl2 = new THREE.DirectionalLight(0xff8844, 0.5);
dl2.position.set(-5, -4, -3); scene.add(dl2);

// ---- 4D math ----
function rot4d(pts, a, b, ang) {
  const c = Math.cos(ang), s = Math.sin(ang);
  return pts.map(p => {
    const v = [...p];
    const va = v[a], vb = v[b];
    v[a] = c*va - s*vb;
    v[b] = s*va + c*vb;
    return v;
  });
}

function project4to3(pts4, t) {
  const speeds = [0.18, 0.13, 0.09, 0.05, 0.11];
  const planes  = [[0,1],[2,3],[0,3],[1,2],[1,3]];
  let v = pts4.map(p => [...p]);
  planes.forEach(([a,b], i) => { v = rot4d(v, a, b, t * speeds[i]); });
  const d4 = 2.5;
  return v.map(p => {
    const w4 = 1 / (d4 - p[3]);
    return new THREE.Vector3(p[0]*w4, p[1]*w4, p[2]*w4);
  });
}

// ---- Enumerate 24 faces ----
function makeFaces4() {
  const faces = [];
  for (let a = 0; a < 4; a++) for (let b = a+1; b < 4; b++) {
    const fixed = [0,1,2,3].filter(d => d !== a && d !== b);
    for (const fa of [-1,1]) for (const fb of [-1,1]) {
      const quad = [[-1,-1],[1,-1],[1,1],[-1,1]].map(([va,vb]) => {
        const v = [0,0,0,0];
        v[a]=va; v[b]=vb; v[fixed[0]]=fa; v[fixed[1]]=fb;
        return v;
      });
      const wAvg = quad.reduce((s,v) => s + v[3], 0) / 4;
      faces.push({ quad, wAvg });
    }
  }
  return faces;
}
const faces4 = makeFaces4();

// ---- Scene group (rotatable by mouse) ----
const rotGroup = new THREE.Group();
scene.add(rotGroup);

const SCALE = 2.0;
const colInner = new THREE.Color(0x3c8cff);
const colOuter = new THREE.Color(0x32ff82);
const colMid   = new THREE.Color(0xa087a0);

// Build one mesh + one line per face
const faceObjects = faces4.map(faceData => {
  const col = faceData.wAvg > 0.4 ? colOuter
             : faceData.wAvg < -0.4 ? colInner
             : colMid;

  // Face mesh (two triangles)
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6*3), 3));
  geo.setAttribute('normal',   new THREE.BufferAttribute(new Float32Array(6*3), 3));
  const mat = new THREE.MeshPhongMaterial({
    color: col,
    emissive: col,
    emissiveIntensity: 0.15,
    shininess: 60,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.28,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  rotGroup.add(mesh);

  // Edge loop
  const eGeo = new THREE.BufferGeometry();
  eGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(5*3), 3));
  const eMat = new THREE.LineBasicMaterial({
    color: col, transparent: true, opacity: 0.85,
  });
  const line = new THREE.Line(eGeo, eMat);
  rotGroup.add(line);

  return { geo, mesh, eGeo, line, faceData };
});

// ---- Update geometry from 4D projection ----
function updateGeometry(t) {
  faceObjects.forEach(({ geo, eGeo, faceData }) => {
    const pts = project4to3(faceData.quad, t).map(v => v.multiplyScalar(SCALE));

    // Two triangles: (0,1,2) and (0,2,3)
    const pos = geo.attributes.position.array;
    [[0,1,2],[0,2,3]].forEach(([a,b,c], ti) => {
      [pts[a],pts[b],pts[c]].forEach((p, k) => {
        pos[(ti*3+k)*3+0] = p.x;
        pos[(ti*3+k)*3+1] = p.y;
        pos[(ti*3+k)*3+2] = p.z;
      });
    });
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    // Edge loop (5 points to close the quad)
    const ep = eGeo.attributes.position.array;
    [0,1,2,3,0].forEach((vi, i) => {
      ep[i*3+0] = pts[vi].x;
      ep[i*3+1] = pts[vi].y;
      ep[i*3+2] = pts[vi].z;
    });
    eGeo.attributes.position.needsUpdate = true;
  });
}

// ---- Mouse / Touch orbit ----
//let drag = false, prev = {x:0,y:0};
//const el = renderer.domElement;

//el.addEventListener('mousedown', e => { drag=true; prev={x:e.clientX,y:e.clientY}; });

//window.addEventListener('touchend', () => drag=false);
//window.addEventListener('touchmove', e => {
//  if (!drag) return;
//  rotGroup.rotation.y += (e.touches[0].clientX - prev.x) * 0.008;
//  rotGroup.rotation.x += (e.touches[0].clientY - prev.y) * 0.008;
//  prev = {x:e.touches[0].clientX,y:e.touches[0].clientY};
//});

//window.addEventListener('resize', () => {
//  camera.aspect = innerWidth/innerHeight;
//  camera.updateProjectionMatrix();
//  renderer.setSize(innerWidth, innerHeight);
//});

// ---- Stars ----
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(300*3);
for (let i=0; i<300; i++) {
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  const r = 30 + Math.random()*20;
  starPos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  starPos[i*3+2] = r*Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.12, transparent:true, opacity:0.7 });
scene.add(new THREE.Points(starGeo, starMat));

// ---- Render loop ----
let t4 = 0;
function animate() {
  requestAnimationFrame(animate);
  t4 += 0.008;
  updateGeometry(t4);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
